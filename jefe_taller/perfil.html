<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Perfil | FURIA MOTOR</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Estilos -->
    <link rel="stylesheet" href="/jefe_taller/css/dashboard.css">
    <link rel="stylesheet" href="/jefe_taller/css/perfil.css">
    <!-- ========== CONFIGURACIÓN PWA (ICONO TORQUE) ========== -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#C1121F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TORQUE">
    
    <!-- ICONO PARA LA PESTAÑA DEL NAVEGADOR -->
    <link rel="icon" type="image/png" href="/icono.png">
    <link rel="shortcut icon" type="image/png" href="/icono.png">
    
    <!-- ICONO PARA IPHONE / IPAD (pantalla de inicio) -->
    <link rel="apple-touch-icon" href="/icono.png">
    
    <!-- ICONO PARA ANDROID (chrome) -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icono.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icono.png">
    <!-- ===================================================== -->
</head>

<body>
    <!-- ========== BOTÓN HAMBURGUESA PARA MÓVIL/TABLET ========== -->
    <button class="hamburger-menu" id="hamburgerMenu" aria-label="Menú">
        <i class="fas fa-bars"></i>
    </button>

    <!-- ========== OVERLAY PARA CERRAR SIDEBAR ========== -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-user-circle"></i> Mi Perfil</h1>
                    <p>Gestiona tu información personal y cuenta</p>
                </div>
                <div class="top-actions">
                    <div class="notification-icon">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge" id="notificacionesCount">0</span>
                    </div>
                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                </div>
            </header>

            <div class="content">
                <div class="perfil-container">

                    <!-- Tarjeta de Perfil -->
                    <div class="perfil-card">
                        <div class="perfil-avatar-section">
                            <div class="avatar-container">
                                <img id="avatarPreview" src="" alt="Avatar" class="avatar-img">
                                <div class="avatar-overlay" onclick="document.getElementById('avatarInput').click()">
                                    <i class="fas fa-camera"></i>
                                    <span>Cambiar foto</span>
                                </div>
                            </div>
                            <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                            <h2 id="userNameDisplay">Cargando...</h2>
                            <span class="user-role-badge" id="userRoleDisplay">Jefe de Taller</span>
                        </div>

                        <div class="perfil-form-section">
                            <form id="perfilForm">
                                <div class="form-row">
                                    <div class="form-group">
                                        <label><i class="fas fa-user"></i> Nombre completo</label>
                                        <input type="text" id="nombre" class="form-input" placeholder="Tu nombre">
                                    </div>
                                    <div class="form-group">
                                        <label><i class="fas fa-envelope"></i> Correo electrónico</label>
                                        <input type="email" id="email" class="form-input"
                                            placeholder="correo@ejemplo.com">
                                    </div>
                                </div>

                                <div class="form-row">
                                    <div class="form-group">
                                        <label><i class="fas fa-phone"></i> Teléfono / Contacto</label>
                                        <input type="text" id="contacto" class="form-input" placeholder="Ej: 76543210">
                                    </div>
                                    <div class="form-group">
                                        <label><i class="fas fa-map-marker-alt"></i> Ubicación</label>
                                        <input type="text" id="ubicacion" class="form-input"
                                            placeholder="Dirección o ubicación">
                                    </div>
                                </div>

                                <div class="form-actions">
                                    <button type="button" class="btn-primary" id="btnGuardarPerfil">
                                        <i class="fas fa-save"></i> Guardar Cambios
                                    </button>
                                    <button type="button" class="btn-secondary" id="btnCancelar">
                                        <i class="fas fa-undo"></i> Cancelar
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>

                    <!-- Tarjeta de Cambio de Contraseña -->
                    <div class="password-card">
                        <h3><i class="fas fa-lock"></i> Cambiar Contraseña</h3>
                        <form id="passwordForm">
                            <div class="form-row">
                                <div class="form-group">
                                    <label><i class="fas fa-key"></i> Contraseña actual</label>
                                    <input type="password" id="currentPassword" class="form-input"
                                        placeholder="Ingresa tu contraseña actual">
                                </div>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label><i class="fas fa-lock"></i> Nueva contraseña</label>
                                    <input type="password" id="newPassword" class="form-input"
                                        placeholder="Nueva contraseña">
                                    <small class="form-hint">Mínimo 6 caracteres</small>
                                </div>
                                <div class="form-group">
                                    <label><i class="fas fa-check-circle"></i> Confirmar nueva contraseña</label>
                                    <input type="password" id="confirmPassword" class="form-input"
                                        placeholder="Confirma tu nueva contraseña">
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="button" class="btn-primary" id="btnCambiarPassword">
                                    <i class="fas fa-sync-alt"></i> Actualizar Contraseña
                                </button>
                            </div>
                        </form>
                    </div>

                    <!-- Tarjeta de Estadísticas Personales -->
                    <div class="stats-card">
                        <h3><i class="fas fa-chart-line"></i> Mi Actividad</h3>
                        <div class="stats-grid">
                            <div class="stat-item">
                                <div class="stat-number" id="ordenesAtendidas">0</div>
                                <div class="stat-label">Órdenes atendidas</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number" id="diagnosticosRevisados">0</div>
                                <div class="stat-label">Diagnósticos revisados</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number" id="miembroDesde">-</div>
                                <div class="stat-label">Miembro desde</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-number" id="ultimoAcceso">-</div>
                                <div class="stat-label">Último acceso</div>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </main>
    </div>

    <script src="/jefe_taller/js/include.js"></script>
    <script src="/jefe_taller/js/perfil.js"></script>
    
    <!-- ========== SCRIPT RESPONSIVE PARA SIDEBAR (JEFE TALLER - PERFIL) ========== -->
    <script>
        // =====================================================
        // FUNCIONES RESPONSIVE PARA SIDEBAR (JEFE TALLER - PERFIL)
        // =====================================================
        
        let sidebarOpen = false;
        
        // Función para toggle sidebar en móvil/tablet
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const hamburger = document.getElementById('hamburgerMenu');
            const body = document.body;
            
            if (!sidebar) return;
            
            sidebarOpen = !sidebarOpen;
            
            if (sidebarOpen) {
                sidebar.classList.add('open');
                if (overlay) overlay.classList.add('active');
                if (hamburger) hamburger.classList.add('active');
                body.classList.add('sidebar-open');
                
                // Cambiar icono del hamburguesa
                const icon = hamburger.querySelector('i');
                if (icon) icon.className = 'fas fa-times';
            } else {
                closeSidebar();
            }
        }
        
        // Función para cerrar sidebar
        function closeSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const hamburger = document.getElementById('hamburgerMenu');
            const body = document.body;
            
            if (sidebar) {
                sidebar.classList.remove('open');
                if (overlay) overlay.classList.remove('active');
                if (hamburger) hamburger.classList.remove('active');
                body.classList.remove('sidebar-open');
                
                const icon = hamburger.querySelector('i');
                if (icon) icon.className = 'fas fa-bars';
            }
            
            sidebarOpen = false;
        }
        
        // Event Listeners
        document.addEventListener('DOMContentLoaded', function() {
            // Botón hamburguesa
            const hamburgerBtn = document.getElementById('hamburgerMenu');
            if (hamburgerBtn) {
                hamburgerBtn.addEventListener('click', toggleSidebar);
            }
            
            // Overlay
            const overlay = document.getElementById('sidebarOverlay');
            if (overlay) {
                overlay.addEventListener('click', closeSidebar);
            }
            
            // Cerrar sidebar al redimensionar a desktop
            window.addEventListener('resize', function() {
                if (window.innerWidth > 1024 && sidebarOpen) {
                    closeSidebar();
                }
            });
            
            // Cerrar sidebar al hacer click en enlaces (móvil)
            document.addEventListener('click', function(e) {
                if (window.innerWidth <= 1024 && sidebarOpen) {
                    const sidebar = document.querySelector('.sidebar');
                    const hamburger = document.getElementById('hamburgerMenu');
                    
                    // Si el click no fue en el sidebar ni en el botón hamburguesa
                    if (sidebar && !sidebar.contains(e.target) && hamburger && !hamburger.contains(e.target)) {
                        closeSidebar();
                    }
                }
            });
            
            // Prevenir scroll del body cuando sidebar está abierto
            document.addEventListener('touchmove', function(e) {
                if (window.innerWidth <= 1024 && sidebarOpen) {
                    const sidebar = document.querySelector('.sidebar');
                    if (sidebar && !sidebar.contains(e.target)) {
                        e.preventDefault();
                    }
                }
            });
        });
        
        // Exponer funciones globalmente
        window.toggleSidebar = toggleSidebar;
        window.closeSidebar = closeSidebar;
        
        console.log('✅ perfil.html (Jefe Taller) - Funciones responsive cargadas');
    </script>
</body>

</html>
