<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Técnico - Historial de Trabajos | FURIA MOTOR</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/historial.css">
    <!-- ========== CONFIGURACIÓN PWA (ICONO TORQUE) ========== -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#C1121F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TORQUE">
    
    <!-- ICONO PARA LA PESTAÑA DEL NAVEGADOR -->
    <link rel="icon" type="image/png" href="/icono.png">
    <link rel="shortcut icon" type="image/png" href="/icono.png">
    
    <!-- ICONO PARA IPHONE / IPAD (pantalla de inicio) -->
    <link rel="apple-touch-icon" href="/icono.png">
    
    <!-- ICONO PARA ANDROID (chrome) -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icono.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icono.png">
    <!-- ===================================================== -->
</head>

<body>
    <!-- ========== BOTÓN HAMBURGUESA PARA MÓVIL/TABLET ========== -->
    <button class="hamburger-menu" id="hamburgerMenu" aria-label="Menú">
        <i class="fas fa-bars"></i>
    </button>

    <!-- ========== OVERLAY PARA CERRAR SIDEBAR ========== -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app">
        <!-- SIDEBAR -->
        <div id="sidebar-container"></div>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-history"></i> Historial de Trabajos</h1>
                    <p>Consulta el historial de vehículos que has atendido</p>
                </div>

                <div class="top-actions">
                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                    <!-- 🔴 BOTÓN DE LOGOUT ELIMINADO - Está en el sidebar -->
                </div>
            </header>

            <!-- CONTENT -->
            <div class="content">
                <!-- Filtros -->
                <div class="filtros-container">
                    <div class="filtros-header">
                        <h3><i class="fas fa-filter"></i> Filtros de Búsqueda</h3>
                        <button class="btn-limpiar-filtros" id="btnLimpiarFiltros">
                            <i class="fas fa-eraser"></i> Limpiar Filtros
                        </button>
                    </div>
                    <div class="filtros-grid">
                        <div class="filtro-group">
                            <label><i class="fas fa-search"></i> Buscar</label>
                            <input type="text" id="searchInput" class="filtro-input"
                                placeholder="Código, placa, marca, modelo o cliente...">
                        </div>
                        <div class="filtro-group">
                            <label><i class="fas fa-calendar-alt"></i> Desde</label>
                            <input type="date" id="fechaDesde" class="filtro-input">
                        </div>
                        <div class="filtro-group">
                            <label><i class="fas fa-calendar-alt"></i> Hasta</label>
                            <input type="date" id="fechaHasta" class="filtro-input">
                        </div>
                        <div class="filtro-group">
                            <label><i class="fas fa-chart-line"></i> Estado</label>
                            <select id="estadoFiltro" class="filtro-select">
                                <option value="todos">Todos</option>
                                <option value="Finalizado">Finalizado</option>
                                <option value="Entregado">Entregado</option>
                                <option value="EnProceso">En Proceso</option>
                                <option value="EnPausa">En Pausa</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Estadísticas -->
                <div class="stats-container">
                    <div class="stat-card">
                        <i class="fas fa-tasks"></i>
                        <div class="stat-info">
                            <span class="stat-value" id="totalTrabajos">0</span>
                            <span class="stat-label">Total Trabajos</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-check-circle"></i>
                        <div class="stat-info">
                            <span class="stat-value" id="trabajosFinalizados">0</span>
                            <span class="stat-label">Finalizados/Entregados</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-clock"></i>
                        <div class="stat-info">
                            <span class="stat-value" id="trabajosEnProceso">0</span>
                            <span class="stat-label">En Proceso</span>
                        </div>
                    </div>
                    <div class="stat-card">
                        <i class="fas fa-pause-circle"></i>
                        <div class="stat-info">
                            <span class="stat-value" id="trabajosEnPausa">0</span>
                            <span class="stat-label">En Pausa</span>
                        </div>
                    </div>
                </div>

                <!-- Lista de Trabajos -->
                <div class="trabajos-container">
                    <div class="trabajos-header">
                        <h3><i class="fas fa-list"></i> Historial de Trabajos</h3>
                        <div class="pagination-info">
                            <span id="paginacionInfo"></span>
                        </div>
                    </div>

                    <div id="trabajosList" class="trabajos-list">
                        <div class="loading-state">
                            <i class="fas fa-spinner fa-spin"></i>
                            <p>Cargando historial...</p>
                        </div>
                    </div>

                    <!-- Paginación -->
                    <div class="pagination-container" id="paginationContainer" style="display: none;">
                        <button class="btn-paginacion" id="btnPaginaAnterior" disabled>
                            <i class="fas fa-chevron-left"></i> Anterior
                        </button>
                        <span class="paginacion-paginas" id="paginasInfo"></span>
                        <button class="btn-paginacion" id="btnPaginaSiguiente" disabled>
                            Siguiente <i class="fas fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de Detalle -->
    <div class="modal" id="modalDetalle">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h2><i class="fas fa-info-circle"></i> Detalle del Trabajo</h2>
                <button class="modal-close" onclick="cerrarModalDetalle()">&times;</button>
            </div>
            <div class="modal-body" id="detalleBody">
                <!-- Contenido dinámico -->
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="cerrarModalDetalle()">Cerrar</button>
                <button class="btn-primary" id="btnExportarDetalle" onclick="exportarDetalle()">
                    <i class="fas fa-download"></i> Exportar Detalle
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- ===================================================== -->
    <!-- SCRIPTS - INCLUDE.JS PRIMERO (DEFINE EL SIDEBAR) -->
    <!-- ===================================================== -->
    <script src="js/include.js"></script>
    <script src="js/historial.js"></script>

    <!-- ===================================================== -->
    <!-- FUNCIONES RESPONSIVE Y AUXILIARES -->
    <!-- ===================================================== -->
    <script>
        /**
         * Actualiza la fecha actual en el top-bar
         */
        function updateCurrentDate() {
            const dateElement = document.getElementById('currentDate');
            if (dateElement) {
                const now = new Date();
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                dateElement.textContent = now.toLocaleDateString('es-ES', options);
            }
        }

        /**
         * INICIALIZACIÓN - Se ejecuta cuando el DOM está listo
         */
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 historial.html - Inicializando...');
            
            // Actualizar fecha
            updateCurrentDate();

            // =============================================
            // CONFIGURAR HAMBURGUESA Y OVERLAY
            // Usamos las funciones GLOBALES definidas en include.js
            // =============================================

            const hamburgerBtn = document.getElementById('hamburgerMenu');
            if (hamburgerBtn) {
                hamburgerBtn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    // Usar la función global de include.js
                    if (typeof window.toggleSidebar === 'function') {
                        window.toggleSidebar();
                    } else {
                        console.warn('⚠️ toggleSidebar no está definida globalmente');
                    }
                });
            }

            const overlay = document.getElementById('sidebarOverlay');
            if (overlay) {
                overlay.addEventListener('click', function() {
                    if (typeof window.cerrarSidebar === 'function') {
                        window.cerrarSidebar();
                    }
                });
            }

            // Cerrar sidebar al hacer click fuera en móvil
            document.addEventListener('click', function(e) {
                if (window.innerWidth <= 1024) {
                    const sidebar = document.querySelector('.sidebar');
                    const hamburger = document.getElementById('hamburgerMenu');
                    const overlayEl = document.getElementById('sidebarOverlay');
                    
                    if (sidebar && sidebar.classList.contains('open')) {
                        const isClickInsideSidebar = sidebar.contains(e.target);
                        const isClickOnHamburger = hamburger && hamburger.contains(e.target);
                        const isClickOnOverlay = overlayEl && overlayEl.contains(e.target);
                        
                        if (!isClickInsideSidebar && !isClickOnHamburger && !isClickOnOverlay) {
                            if (typeof window.cerrarSidebar === 'function') {
                                window.cerrarSidebar();
                            }
                        }
                    }
                }
            });

            // Cerrar sidebar al redimensionar a escritorio
            window.addEventListener('resize', function() {
                if (window.innerWidth > 1024) {
                    if (typeof window.cerrarSidebar === 'function') {
                        window.cerrarSidebar();
                    }
                }
            });

            console.log('✅ historial.html - Inicialización completa');
        });

        // =====================================================
        // FUNCIONES PARA CERRAR MODALES (EXPUESTAS GLOBALMENTE)
        // =====================================================

        window.cerrarModalDetalle = function() {
            const modal = document.getElementById('modalDetalle');
            if (modal) modal.classList.remove('show');
        };

        // Función global de logout (por si acaso)
        window.cerrarSesion = function() {
            if (confirm('¿Estás seguro de que deseas cerrar sesión?')) {
                localStorage.removeItem('furia_token');
                localStorage.removeItem('furia_user');
                localStorage.removeItem('furia_remembered');
                localStorage.removeItem('furia_remembered_type');
                localStorage.removeItem('furia_selected_role');
                localStorage.removeItem('furia_selected_role_user');
                window.location.href = '/';
            }
        };

        console.log('✅ historial.html - Funciones cargadas correctamente');
    </script>
</body>

</html>
