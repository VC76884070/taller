<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Encargado Repuestos - FURIA MOTOR</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/perfil.css">
    <!-- ========== CONFIGURACIÓN PWA (ICONO TORQUE) ========== -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#C1121F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TORQUE">
    
    <!-- ICONO PARA LA PESTAÑA DEL NAVEGADOR -->
    <link rel="icon" type="image/png" href="/icono.png">
    <link rel="shortcut icon" type="image/png" href="/icono.png">
    
    <!-- ICONO PARA IPHONE / IPAD (pantalla de inicio) -->
    <link rel="apple-touch-icon" href="/icono.png">
    
    <!-- ICONO PARA ANDROID (chrome) -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icono.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icono.png">
    <!-- ===================================================== -->
</head>

<body>
    <div class="app">
        <!-- SIDEBAR -->
        <div id="sidebar-container"></div>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1>Mi Perfil</h1>
                    <p>Gestiona tu información personal y contraseña</p>
                </div>
                <div class="top-actions">
                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                </div>
            </div>

            <div class="content">
                <div class="perfil-grid">
                    <!-- Columna Izquierda - Avatar -->
                    <div class="perfil-card avatar-card">
                        <div class="avatar-container">
                            <div class="avatar-large" id="avatarPreview">
                                <i class="fas fa-boxes"></i>
                            </div>
                            <!-- Botones para avatar -->
                            <div class="avatar-buttons">
                                <button class="btn-cambiar-avatar" onclick="abrirModalAvatar()">
                                    <i class="fas fa-images"></i> Elegir Icono
                                </button>
                                <button class="btn-upload-avatar" onclick="document.getElementById('uploadAvatarInput').click()">
                                    <i class="fas fa-upload"></i> Subir Foto
                                </button>
                            </div>
                            <!-- Input oculto para subir imagen -->
                            <input type="file" id="uploadAvatarInput" accept="image/*" style="display: none;">
                            <!-- Mensaje si no tiene avatar -->
                            <div id="avatarWarning" style="display: none; margin-top: 0.5rem; font-size: 0.7rem; color: var(--ambar-alerta);">
                                <i class="fas fa-exclamation-triangle"></i> No tienes avatar. ¡Sube una foto o elige uno!
                            </div>
                        </div>
                        <div class="info-basica">
                            <h2 id="displayNombre">Cargando...</h2>
                            <p class="rol-badge">Encargado de Repuestos</p>
                            <p class="email-display" id="displayEmail">cargando@email.com</p>
                        </div>
                    </div>

                    <!-- Columna Derecha - Información y Contraseña -->
                    <div class="perfil-card">
                        <!-- Información Personal -->
                        <div class="card-header">
                            <h3><i class="fas fa-user-circle"></i> Información Personal</h3>
                            <button class="btn-secondary btn-sm" id="btnEditarInfo">
                                <i class="fas fa-pen"></i> Editar
                            </button>
                        </div>
                        <form id="formInformacion">
                            <div class="form-group">
                                <label>Nombre Completo</label>
                                <input type="text" id="nombre" class="form-control" disabled>
                            </div>
                            <div class="form-group">
                                <label>Correo Electrónico</label>
                                <input type="email" id="email" class="form-control" disabled>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Teléfono</label>
                                    <input type="tel" id="telefono" class="form-control" disabled>
                                </div>
                                <div class="form-group">
                                    <label>WhatsApp</label>
                                    <input type="tel" id="whatsapp" class="form-control" disabled>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Dirección</label>
                                <input type="text" id="direccion" class="form-control" disabled>
                            </div>
                            <div class="form-actions" id="infoActions" style="display: none;">
                                <button type="button" class="btn-secondary" onclick="cancelarEdicionInfo()">Cancelar</button>
                                <button type="submit" class="btn-primary">Guardar Cambios</button>
                            </div>
                        </form>

                        <div class="divider"></div>

                        <!-- Cambiar Contraseña -->
                        <div class="card-header">
                            <h3><i class="fas fa-lock"></i> Cambiar Contraseña</h3>
                        </div>
                        <form id="formPassword">
                            <div class="form-group">
                                <label>Contraseña Actual</label>
                                <div class="password-input-group">
                                    <input type="password" id="passwordActual" class="form-control" required>
                                    <button type="button" class="toggle-password" onclick="togglePassword('passwordActual')">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Nueva Contraseña</label>
                                <div class="password-input-group">
                                    <input type="password" id="passwordNueva" class="form-control" required>
                                    <button type="button" class="toggle-password" onclick="togglePassword('passwordNueva')">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <div class="password-strength" id="passwordStrength"></div>
                            </div>
                            <div class="form-group">
                                <label>Confirmar Nueva Contraseña</label>
                                <div class="password-input-group">
                                    <input type="password" id="passwordConfirmar" class="form-control" required>
                                    <button type="button" class="toggle-password" onclick="togglePassword('passwordConfirmar')">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn-primary">
                                    <i class="fas fa-sync-alt"></i> Cambiar Contraseña
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal para seleccionar avatar de iconos -->
    <div id="modalAvatar" class="modal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3><i class="fas fa-images"></i> Seleccionar Avatar</h3>
                <span class="close-modal" onclick="cerrarModal('modalAvatar')">&times;</span>
            </div>
            <div class="modal-body">
                <p style="color: var(--gris-texto); margin-bottom: 1rem; font-size: 0.8rem;">
                    <i class="fas fa-info-circle"></i> Elige un avatar predefinido
                </p>
                <div class="avatar-options">
                    <div class="avatar-option" onclick="seleccionarAvatar('box')" data-avatar="box">
                        <i class="fas fa-boxes"></i>
                        <span>Repuestos</span>
                    </div>
                    <div class="avatar-option" onclick="seleccionarAvatar('user')" data-avatar="user">
                        <i class="fas fa-user-circle"></i>
                        <span>Usuario</span>
                    </div>
                    <div class="avatar-option" onclick="seleccionarAvatar('truck')" data-avatar="truck">
                        <i class="fas fa-truck"></i>
                        <span>Proveedor</span>
                    </div>
                    <div class="avatar-option" onclick="seleccionarAvatar('warehouse')" data-avatar="warehouse">
                        <i class="fas fa-warehouse"></i>
                        <span>Almacén</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="cerrarModal('modalAvatar')">Cancelar</button>
                <button class="btn-primary" onclick="guardarAvatar()">
                    <i class="fas fa-save"></i> Guardar
                </button>
            </div>
        </div>
    </div>

    <!-- LOADING OVERLAY -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <script src="js/include.js"></script>
    <script src="js/perfil.js"></script>
</body>

</html>
