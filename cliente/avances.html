<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avances de Reparación | FURIA MOTOR</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/misvehiculos.css">
    <link rel="stylesheet" href="css/avances.css">
</head>

<body>
    <div class="app">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-chart-line"></i> Avances de Reparación</h1>
                    <p>Sigue el progreso de tu vehículo paso a paso</p>
                </div>
                <div class="top-actions">
                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                    <button class="btn-logout" onclick="cerrarSesion()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <div class="content">
                <!-- Selector de vehículo - diseño elegante -->
                <div class="vehiculo-selector">
                    <label class="selector-label">
                        <i class="fas fa-car"></i>
                        <span>Mi vehículo</span>
                    </label>
                    <div class="selector-control">
                        <select id="selectVehiculo" class="vehiculo-select">
                            <option value="">-- Seleccionar vehículo --</option>
                        </select>
                        <button id="btnVerAvances" class="btn-ver">
                            <i class="fas fa-eye"></i>
                            <span>Ver progreso</span>
                        </button>
                    </div>
                </div>

                <!-- Contenedor de contenido dinámico -->
                <div id="contenidoDinamico"></div>
            </div>
        </main>
    </div>

    <!-- Modal de detalle -->
    <div class="modal" id="modalDetalle">
        <div class="modal-content modal-detalle">
            <div class="modal-header">
                <h2><i class="fas fa-clipboard-list"></i> <span id="modalTitulo">Detalle</span></h2>
                <button class="modal-close" onclick="cerrarModal('modalDetalle')">&times;</button>
            </div>
            <div class="modal-body" id="modalCuerpo"></div>
        </div>
    </div>

    <!-- Modal de foto ampliada -->
    <div class="modal modal-fullscreen" id="modalFoto" onclick="cerrarModalFoto()">
        <div class="modal-foto-container" onclick="event.stopPropagation()">
            <button class="modal-foto-close" onclick="cerrarModalFoto()">&times;</button>
            <img id="fotoAmpliada" src="" alt="Foto ampliada">
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <p>Cargando...</p>
    </div>

    <script src="js/include.js"></script>
    <script src="js/avances.js"></script>
</body>

</html>
