<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avance de Trabajo | FURIA MOTOR - Técnico</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/avance.css">
</head>

<body>
    <div class="app">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-chart-line"></i> Avance de Trabajo</h1>
                    <p>Registra el progreso de tus reparaciones con fotos y comentarios</p>
                </div>
                <div class="top-actions">
                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                    <button class="btn-logout" onclick="cerrarSesion()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <div class="content">
                <!-- Selección de orden -->
                <div class="selector-orden">
                    <div class="selector-header">
                        <i class="fas fa-clipboard-list"></i>
                        <h3>Seleccionar Orden de Trabajo</h3>
                    </div>
                    <div class="selector-body">
                        <select id="selectOrden" class="form-select">
                            <option value="">-- Selecciona una orden en reparación --</option>
                        </select>
                        <button id="btnCargarAvances" class="btn-primary">
                            <i class="fas fa-sync-alt"></i> Cargar Avances
                        </button>
                    </div>
                </div>

                <!-- Lista de avances existentes -->
                <div id="avancesExistentes" class="avances-section" style="display: none;">
                    <div class="section-header">
                        <div class="section-header-left">
                            <i class="fas fa-history"></i>
                            <h3>Avances Registrados</h3>
                        </div>
                        <button id="btnNuevoAvance" class="btn-outline">
                            <i class="fas fa-plus"></i> Nuevo Avance
                        </button>
                    </div>
                    <div id="listaAvances" class="avances-grid"></div>
                </div>

                <!-- Formulario de nuevo/editar avance -->
                <div id="formAvance" class="form-avance-section" style="display: none;">
                    <div class="section-header">
                        <div class="section-header-left">
                            <i class="fas fa-camera"></i>
                            <h3 id="formTitle">Registrar Nuevo Avance</h3>
                        </div>
                        <button id="btnCancelarAvance" class="btn-secondary">
                            <i class="fas fa-times"></i> Cancelar
                        </button>
                    </div>

                    <div class="form-avance">
                        <div class="form-group">
                            <label><i class="fas fa-tag"></i> Título del Avance <span class="required">*</span></label>
                            <input type="text" id="tituloAvance" class="form-input"
                                placeholder="Ej: Reparación del motor, Cambio de frenos...">
                        </div>

                        <div class="form-group">
                            <label><i class="fas fa-align-left"></i> Descripción General</label>
                            <textarea id="descripcionAvance" class="form-textarea" rows="3"
                                placeholder="Describe el trabajo realizado en este avance..."></textarea>
                        </div>

                        <!-- Grid de fotos (10 espacios) -->
                        <div class="fotos-grid-container">
                            <label><i class="fas fa-images"></i> Fotos del Avance <span class="required">*</span>
                                (Máximo 10)</label>
                            <div class="fotos-grid" id="fotosGrid">
                                <!-- Foto 1 -->
                                <div class="foto-upload-item" data-index="0">
                                    <div class="foto-preview" onclick="document.getElementById('fotoInput_0').click()">
                                        <i class="fas fa-plus-circle"></i>
                                        <span>Foto 1</span>
                                    </div>
                                    <input type="file" id="fotoInput_0" class="foto-input" accept="image/*"
                                        style="display: none;">
                                    <textarea id="comentario_0" class="foto-comentario" rows="2"
                                        placeholder="Comentario de esta foto..."></textarea>
                                    <button class="btn-remove-foto" onclick="eliminarFoto(0)" style="display: none;">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                                <!-- Foto 2 -->
                                <div class="foto-upload-item" data-index="1">
                                    <div class="foto-preview" onclick="document.getElementById('fotoInput_1').click()">
                                        <i class="fas fa-plus-circle"></i>
                                        <span>Foto 2</span>
                                    </div>
                                    <input type="file" id="fotoInput_1" class="foto-input" accept="image/*"
                                        style="display: none;">
                                    <textarea id="comentario_1" class="foto-comentario" rows="2"
                                        placeholder="Comentario de esta foto..."></textarea>
                                    <button class="btn-remove-foto" onclick="eliminarFoto(1)" style="display: none;">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                                <!-- Foto 3 -->
                                <div class="foto-upload-item" data-index="2">
                                    <div class="foto-preview" onclick="document.getElementById('fotoInput_2').click()">
                                        <i class="fas fa-plus-circle"></i>
                                        <span>Foto 3</span>
                                    </div>
                                    <input type="file" id="fotoInput_2" class="foto-input" accept="image/*"
                                        style="display: none;">
                                    <textarea id="comentario_2" class="foto-comentario" rows="2"
                                        placeholder="Comentario de esta foto..."></textarea>
                                    <button class="btn-remove-foto" onclick="eliminarFoto(2)" style="display: none;">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                                <!-- Foto 4 -->
                                <div class="foto-upload-item" data-index="3">
                                    <div class="foto-preview" onclick="document.getElementById('fotoInput_3').click()">
                                        <i class="fas fa-plus-circle"></i>
                                        <span>Foto 4</span>
                                    </div>
                                    <input type="file" id="fotoInput_3" class="foto-input" accept="image/*"
                                        style="display: none;">
                                    <textarea id="comentario_3" class="foto-comentario" rows="2"
                                        placeholder="Comentario de esta foto..."></textarea>
                                    <button class="btn-remove-foto" onclick="eliminarFoto(3)" style="display: none;">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                                <!-- Foto 5 -->
                                <div class="foto-upload-item" data-index="4">
                                    <div class="foto-preview" onclick="document.getElementById('fotoInput_4').click()">
                                        <i class="fas fa-plus-circle"></i>
                                        <span>Foto 5</span>
                                    </div>
                                    <input type="file" id="fotoInput_4" class="foto-input" accept="image/*"
                                        style="display: none;">
                                    <textarea id="comentario_4" class="foto-comentario" rows="2"
                                        placeholder="Comentario de esta foto..."></textarea>
                                    <button class="btn-remove-foto" onclick="eliminarFoto(4)" style="display: none;">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                                <!-- Foto 6 -->
                                <div class="foto-upload-item" data-index="5">
                                    <div class="foto-preview" onclick="document.getElementById('fotoInput_5').click()">
                                        <i class="fas fa-plus-circle"></i>
                                        <span>Foto 6</span>
                                    </div>
                                    <input type="file" id="fotoInput_5" class="foto-input" accept="image/*"
                                        style="display: none;">
                                    <textarea id="comentario_5" class="foto-comentario" rows="2"
                                        placeholder="Comentario de esta foto..."></textarea>
                                    <button class="btn-remove-foto" onclick="eliminarFoto(5)" style="display: none;">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                                <!-- Foto 7 -->
                                <div class="foto-upload-item" data-index="6">
                                    <div class="foto-preview" onclick="document.getElementById('fotoInput_6').click()">
                                        <i class="fas fa-plus-circle"></i>
                                        <span>Foto 7</span>
                                    </div>
                                    <input type="file" id="fotoInput_6" class="foto-input" accept="image/*"
                                        style="display: none;">
                                    <textarea id="comentario_6" class="foto-comentario" rows="2"
                                        placeholder="Comentario de esta foto..."></textarea>
                                    <button class="btn-remove-foto" onclick="eliminarFoto(6)" style="display: none;">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                                <!-- Foto 8 -->
                                <div class="foto-upload-item" data-index="7">
                                    <div class="foto-preview" onclick="document.getElementById('fotoInput_7').click()">
                                        <i class="fas fa-plus-circle"></i>
                                        <span>Foto 8</span>
                                    </div>
                                    <input type="file" id="fotoInput_7" class="foto-input" accept="image/*"
                                        style="display: none;">
                                    <textarea id="comentario_7" class="foto-comentario" rows="2"
                                        placeholder="Comentario de esta foto..."></textarea>
                                    <button class="btn-remove-foto" onclick="eliminarFoto(7)" style="display: none;">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                                <!-- Foto 9 -->
                                <div class="foto-upload-item" data-index="8">
                                    <div class="foto-preview" onclick="document.getElementById('fotoInput_8').click()">
                                        <i class="fas fa-plus-circle"></i>
                                        <span>Foto 9</span>
                                    </div>
                                    <input type="file" id="fotoInput_8" class="foto-input" accept="image/*"
                                        style="display: none;">
                                    <textarea id="comentario_8" class="foto-comentario" rows="2"
                                        placeholder="Comentario de esta foto..."></textarea>
                                    <button class="btn-remove-foto" onclick="eliminarFoto(8)" style="display: none;">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                                <!-- Foto 10 -->
                                <div class="foto-upload-item" data-index="9">
                                    <div class="foto-preview" onclick="document.getElementById('fotoInput_9').click()">
                                        <i class="fas fa-plus-circle"></i>
                                        <span>Foto 10</span>
                                    </div>
                                    <input type="file" id="fotoInput_9" class="foto-input" accept="image/*"
                                        style="display: none;">
                                    <textarea id="comentario_9" class="foto-comentario" rows="2"
                                        placeholder="Comentario de esta foto..."></textarea>
                                    <button class="btn-remove-foto" onclick="eliminarFoto(9)" style="display: none;">
                                        <i class="fas fa-trash-alt"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button id="btnGuardarAvance" class="btn-secondary">
                                <i class="fas fa-save"></i> Guardar Borrador
                            </button>
                            <button id="btnEnviarRevision" class="btn-primary">
                                <i class="fas fa-paper-plane"></i> Enviar a Revisión
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de detalle de avance -->
    <div class="modal" id="modalDetalleAvance">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h2><i class="fas fa-clipboard-list"></i> Detalle del Avance</h2>
                <button class="modal-close" onclick="cerrarModal('modalDetalleAvance')">&times;</button>
            </div>
            <div class="modal-body" id="detalleAvanceBody"></div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="cerrarModal('modalDetalleAvance')">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Modal de ver foto ampliada -->
    <div class="modal" id="modalFoto" onclick="cerrarModalFoto()">
        <div class="modal-content" style="max-width: 90%; background: transparent;" onclick="event.stopPropagation()">
            <div style="text-align: right; margin-bottom: 0.5rem;">
                <button class="modal-close" onclick="cerrarModalFoto()"
                    style="background: var(--bg-card);">&times;</button>
            </div>
            <img id="fotoAmpliada" src="" style="width: 100%; border-radius: var(--radius-lg);">
        </div>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <script src="js/include.js"></script>
    <script src="js/avance.js"></script>
</body>

</html>
