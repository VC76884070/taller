<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avances de Reparación | FURIA MOTOR</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/misvehiculos.css">
    <link rel="stylesheet" href="css/avances.css">
    <!-- ========== CONFIGURACIÓN PWA (ICONO TORQUE) ========== -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#C1121F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TORQUE">
    
    <!-- ICONO PARA LA PESTAÑA DEL NAVEGADOR -->
    <link rel="icon" type="image/png" href="/icono.png">
    <link rel="shortcut icon" type="image/png" href="/icono.png">
    
    <!-- ICONO PARA IPHONE / IPAD (pantalla de inicio) -->
    <link rel="apple-touch-icon" href="/icono.png">
    
    <!-- ICONO PARA ANDROID (chrome) -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icono.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icono.png">
    <!-- ===================================================== -->
</head>

<body>
    <div class="app">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-chart-line"></i> Avances de Reparación</h1>
                    <p>Sigue el progreso de tu vehículo paso a paso</p>
                </div>
                <div class="top-actions">
                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                </div>
            </header>

            <!-- Dashboard de métricas de avances -->
            <div class="dashboard-stats">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-chart-line"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="totalAvances">0</h3>
                        <p>Avances Registrados</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-image"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="totalFotos">0</h3>
                        <p>Fotos Compartidas</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-calendar-week"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="ultimoAvance">-</h3>
                        <p>Última Actualización</p>
                    </div>
                </div>
            </div>

            <!-- Selector de vehículo mejorado -->
            <div class="vehiculo-selector-premium">
                <div class="selector-header">
                    <i class="fas fa-car"></i>
                    <span>Seleccionar Vehículo</span>
                </div>
                <div class="selector-body">
                    <div class="selector-input-group">
                        <select id="selectVehiculo" class="vehiculo-select-premium">
                            <option value="">-- Seleccionar vehículo --</option>
                        </select>
                        <button id="btnVerAvances" class="btn-ver-premium">
                            <i class="fas fa-eye"></i>
                            <span>Ver progreso</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Contenedor de contenido dinámico -->
            <div id="contenidoDinamico" class="contenido-dinamico"></div>
        </main>
    </div>

    <!-- Modal de detalle de avance -->
    <div class="modal" id="modalDetalle">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3>
                    <i class="fas fa-clipboard-list"></i>
                    <span id="modalTitulo">Detalle del Avance</span>
                </h3>
                <button class="modal-close" onclick="cerrarModal('modalDetalle')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modalCuerpo"></div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="cerrarModal('modalDetalle')">
                    <i class="fas fa-times"></i> Cerrar
                </button>
            </div>
        </div>
    </div>

    <!-- Modal de foto ampliada -->
    <div class="modal modal-fullscreen" id="modalFoto" onclick="cerrarModalFoto()">
        <div class="modal-foto-container" onclick="event.stopPropagation()">
            <button class="modal-foto-close" onclick="cerrarModalFoto()">
                <i class="fas fa-times"></i>
            </button>
            <img id="fotoAmpliada" src="" alt="Foto ampliada">
            <div class="modal-foto-caption" id="fotoCaption"></div>
        </div>
    </div>

    <!-- Modal de orden activa -->
    <div class="modal" id="modalOrden">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3>
                    <i class="fas fa-info-circle"></i>
                    <span>Información de la Orden</span>
                </h3>
                <button class="modal-close" onclick="cerrarModal('modalOrden')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modalOrdenCuerpo"></div>
            <div class="modal-footer">
                <button class="btn-primary" onclick="cerrarModal('modalOrden')">
                    <i class="fas fa-check"></i> Entendido
                </button>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <p>Cargando avances...</p>
    </div>

    <script src="js/include.js"></script>
    <script src="js/avances.js"></script>
</body>

</html>
