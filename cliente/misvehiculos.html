<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Mis Vehículos | FURIA MOTOR</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/misvehiculos.css">
    
    <!-- ========== CONFIGURACIÓN PWA (ICONO TORQUE) ========== -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#C1121F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TORQUE">
    
    <!-- ICONO PARA LA PESTAÑA DEL NAVEGADOR -->
    <link rel="icon" type="image/png" href="/icono.png">
    <link rel="shortcut icon" type="image/png" href="/icono.png">
    
    <!-- ICONO PARA IPHONE / IPAD (pantalla de inicio) -->
    <link rel="apple-touch-icon" href="/icono.png">
    
    <!-- ICONO PARA ANDROID (chrome) -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icono.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icono.png">
    <!-- ===================================================== -->
</head>

<body>
    <!-- Botón hamburguesa para móvil -->
    <button class="hamburger-menu" id="hamburgerMenu" aria-label="Menú">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Overlay para cerrar sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-car"></i> Mis Vehículos</h1>
                    <p>Gestiona y da seguimiento a tus autos</p>
                </div>
                <div class="top-actions">
                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                </div>
            </header>

            <!-- Dashboard de métricas -->
            <div class="dashboard-stats">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-car"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="totalVehiculos">0</h3>
                        <p>Vehículos Registrados</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-tools"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="vehiculosEnTaller">0</h3>
                        <p>En Taller</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="vehiculosFinalizados">0</h3>
                        <p>Reparaciones Completadas</p>
                    </div>
                </div>
            </div>

            <!-- Sistema de pestañas mejorado -->
            <div class="tabs-container">
                <div class="tabs-header">
                    <button class="tab-btn active" data-tab="vehiculos">
                        <i class="fas fa-car-side"></i>
                        <span>Mis Vehículos</span>
                        <span class="tab-badge" id="vehiculosCount">0</span>
                    </button>
                    <button class="tab-btn" data-tab="recientes">
                        <i class="fas fa-clock"></i>
                        <span>Actividad Reciente</span>
                    </button>
                    <button class="tab-btn" data-tab="estadisticas">
                        <i class="fas fa-chart-pie"></i>
                        <span>Estadísticas</span>
                    </button>
                </div>

                <div class="tabs-content">
                    <!-- Pestaña de Vehículos -->
                    <div class="tab-pane active" id="vehiculos-tab">
                        <div class="content-header">
                            <div class="search-box">
                                <i class="fas fa-search"></i>
                                <input type="text" id="searchVehiculo" placeholder="Buscar por placa, marca o modelo...">
                            </div>
                            <button class="btn-filter" id="filterBtn">
                                <i class="fas fa-filter"></i>
                                Filtrar
                            </button>
                        </div>
                        <div id="vehiculosGrid" class="vehiculos-grid">
                            <div class="empty-state">
                                <i class="fas fa-spinner fa-spin"></i>
                                <p>Cargando tus vehículos...</p>
                            </div>
                        </div>
                    </div>

                    <!-- Pestaña de Actividad Reciente -->
                    <div class="tab-pane" id="recientes-tab">
                        <div class="activity-timeline" id="activityTimeline">
                            <div class="empty-state">
                                <i class="fas fa-spinner fa-spin"></i>
                                <p>Cargando actividad...</p>
                            </div>
                        </div>
                    </div>

                    <!-- Pestaña de Estadísticas -->
                    <div class="tab-pane" id="estadisticas-tab">
                        <div class="stats-grid">
                            <div class="stats-card">
                                <h4><i class="fas fa-chart-line"></i> Reparaciones por mes</h4>
                                <canvas id="reparacionesChart"></canvas>
                            </div>
                            <div class="stats-card">
                                <h4><i class="fas fa-motorcycle"></i> Estado de flota</h4>
                                <canvas id="estadoChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de detalle mejorado -->
    <div class="modal" id="modalDetalleVehiculo">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3><i class="fas fa-car"></i> <span id="modalTitulo">Detalle del Vehículo</span></h3>
                <button class="modal-close" onclick="cerrarModal('modalDetalleVehiculo')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modalDetalleBody">
                <!-- Contenido dinámico -->
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="cerrarModal('modalDetalleVehiculo')">Cerrar</button>
                <button class="btn-primary" id="btnVerAvances" onclick="irAvances()">
                    <i class="fas fa-chart-line"></i> Ver progreso completo
                </button>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/include.js"></script>
    <script src="js/misvehiculos.js"></script>

    <script>
        // =====================================================
        // FUNCIONES RESPONSIVE PARA MÓVIL (HAMBURGUESA)
        // =====================================================
        
        let sidebarOpen = false;
        
        // Función para toggle sidebar en móvil
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const hamburger = document.getElementById('hamburgerMenu');
            const body = document.body;
            
            if (!sidebar) return;
            
            sidebarOpen = !sidebarOpen;
            
            if (sidebarOpen) {
                sidebar.classList.add('open');
                if (overlay) overlay.classList.add('active');
                if (hamburger) hamburger.classList.add('active');
                body.classList.add('sidebar-open');
                
                // Cambiar icono del hamburguesa
                const icon = hamburger.querySelector('i');
                if (icon) icon.className = 'fas fa-times';
            } else {
                closeSidebar();
            }
        }
        
        // Función para cerrar sidebar
        function closeSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const hamburger = document.getElementById('hamburgerMenu');
            const body = document.body;
            
            if (sidebar) {
                sidebar.classList.remove('open');
                if (overlay) overlay.classList.remove('active');
                if (hamburger) hamburger.classList.remove('active');
                body.classList.remove('sidebar-open');
                
                const icon = hamburger.querySelector('i');
                if (icon) icon.className = 'fas fa-bars';
            }
            
            sidebarOpen = false;
        }
        
        // Función para mostrar toast temporal (si no existe en misvehiculos.js)
        function mostrarToast(mensaje, tipo = 'info') {
            let container = document.querySelector('.toast-container');
            if (!container) {
                container = document.createElement('div');
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            
            const toast = document.createElement('div');
            toast.className = `toast-notification ${tipo}`;
            const icon = tipo === 'success' ? 'fa-check-circle' : tipo === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle';
            toast.innerHTML = `<i class="fas ${icon}"></i> ${mensaje}`;
            container.appendChild(toast);
            
            setTimeout(() => toast.remove(), 3000);
        }
        
        // Event Listeners
        document.addEventListener('DOMContentLoaded', function() {
            // Botón hamburguesa
            const hamburgerBtn = document.getElementById('hamburgerMenu');
            if (hamburgerBtn) {
                hamburgerBtn.addEventListener('click', toggleSidebar);
            }
            
            // Overlay
            const overlay = document.getElementById('sidebarOverlay');
            if (overlay) {
                overlay.addEventListener('click', closeSidebar);
            }
            
            // Cerrar sidebar al redimensionar a desktop
            window.addEventListener('resize', function() {
                if (window.innerWidth > 1024 && sidebarOpen) {
                    closeSidebar();
                }
            });
            
            // Cerrar sidebar al hacer click en enlaces (móvil)
            document.addEventListener('click', function(e) {
                if (window.innerWidth <= 1024 && sidebarOpen) {
                    const sidebar = document.querySelector('.sidebar');
                    const hamburger = document.getElementById('hamburgerMenu');
                    
                    // Si el click no fue en el sidebar ni en el botón hamburguesa
                    if (sidebar && !sidebar.contains(e.target) && hamburger && !hamburger.contains(e.target)) {
                        closeSidebar();
                    }
                }
            });
            
            // Prevenir scroll del body cuando sidebar está abierto
            document.addEventListener('touchmove', function(e) {
                if (window.innerWidth <= 1024 && sidebarOpen) {
                    const sidebar = document.querySelector('.sidebar');
                    if (sidebar && !sidebar.contains(e.target)) {
                        e.preventDefault();
                    }
                }
            });
            
            // Botón de filtro (toggle simple)
            const filterBtn = document.getElementById('filterBtn');
            if (filterBtn) {
                filterBtn.addEventListener('click', function() {
                    const searchInput = document.getElementById('searchVehiculo');
                    if (searchInput) {
                        searchInput.focus();
                        mostrarToast('Escribe para filtrar vehículos', 'info');
                    }
                });
            }
        });
        
        // Exponer funciones globalmente
        window.toggleSidebar = toggleSidebar;
        window.closeSidebar = closeSidebar;
        window.mostrarToast = mostrarToast;
        
        console.log('✅ misvehiculos.html - Funciones responsive cargadas');
    </script>
</body>

</html>
