<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Jefe de Taller - Dashboard Técnico | FURIA MOTOR</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Flatpickr CSS (alternativa a FullCalendar) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/themes/dark.css">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/dashboard.css">
    
    <!-- ========== CONFIGURACIÓN PWA (ICONO TORQUE) ========== -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#C1121F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TORQUE">
    
    <!-- ICONO PARA LA PESTAÑA DEL NAVEGADOR -->
    <link rel="icon" type="image/png" href="/icono.png">
    <link rel="shortcut icon" type="image/png" href="/icono.png">
    
    <!-- ICONO PARA IPHONE / IPAD (pantalla de inicio) -->
    <link rel="apple-touch-icon" href="/icono.png">
    
    <!-- ICONO PARA ANDROID (chrome) -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icono.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icono.png">
    <!-- ===================================================== -->
</head>

<body>
    <!-- ========== BOTÓN HAMBURGUESA PARA MÓVIL/TABLET ========== -->
    <button class="hamburger-menu" id="hamburgerMenu" aria-label="Menú">
        <i class="fas fa-bars"></i>
    </button>

    <!-- ========== OVERLAY PARA CERRAR SIDEBAR ========== -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app">
        <!-- SIDEBAR -->
        <div id="sidebar-container"></div>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="page-title">
                    <h1>Dashboard Técnico</h1>
                    <p>Panel de control operativo del taller</p>
                </div>

                <div class="top-actions">
                    <div class="notification-icon">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge">5</span>
                    </div>
                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                </div>
            </header>

            <!-- CONTENT -->
            <div class="content">
                <!-- Grid de dos columnas -->
                <div class="dashboard-grid">
                    <!-- Columna Izquierda -->
                    <div class="left-column">
                        <!-- Vista de Bahías -->
                        <div class="card">
                            <div class="card-header">
                                <h3><i class="fas fa-warehouse"></i> Estado de Bahías</h3>
                                <span class="badge-info">12 bahías disponibles</span>
                            </div>
                            <div class="bahias-grid" id="bahiasGrid">
                                <!-- Se llena dinámicamente -->
                            </div>
                        </div>

                        <!-- Calendario con Flatpickr -->
                        <div class="card calendario-card">
                            <div class="card-header">
                                <h3><i class="fas fa-calendar-alt"></i> Calendario de Reparaciones</h3>
                                <div class="calendario-leyenda">
                                    <span class="leyenda-item"><span class="color-reparacion"></span> En reparación</span>
                                    <span class="leyenda-item"><span class="color-entrega"></span> Entrega</span>
                                    <span class="leyenda-item"><span class="color-atrasado"></span> Atrasado</span>
                                </div>
                            </div>
                            <div class="calendario-wrapper">
                                <input type="text" id="calendarioFlatpickr" class="calendario-input" placeholder="Calendario de reparaciones">
                            </div>
                            <!-- Contenedor para información del día seleccionado -->
                            <div id="infoDiaSeleccionado" class="info-dia-container" style="display: none; margin-top: 1rem;">
                                <h4><i class="fas fa-info-circle"></i> Órdenes en este día</h4>
                                <div id="ordenesDelDia" class="ordenes-dia-lista"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Columna Derecha -->
                    <div class="right-column">
                        <!-- Diagnósticos Pendientes -->
                        <div class="card">
                            <div class="card-header">
                                <h3><i class="fas fa-stethoscope"></i> Diagnósticos Pendientes</h3>
                                <span class="badge-warning" id="pendientesCount">0</span>
                            </div>
                            <div class="diagnosticos-list" id="diagnosticosList">
                                <!-- Se llena dinámicamente -->
                            </div>
                        </div>

                        <!-- Próximas Entregas -->
                        <div class="card">
                            <div class="card-header">
                                <h3><i class="fas fa-clock"></i> Próximas Entregas</h3>
                            </div>
                            <div class="entregas-list" id="entregasList">
                                <!-- Se llena dinámicamente -->
                            </div>
                        </div>

                        <!-- Vehículos en Taller -->
                        <div class="card">
                            <div class="card-header">
                                <h3><i class="fas fa-car"></i> Vehículos en Taller</h3>
                                <span class="badge-info" id="vehiculosTallerCount">0</span>
                            </div>
                            <div class="vehiculos-taller-list" id="vehiculosTallerList">
                                <!-- Se llena dinámicamente -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" style="display: none;">
        <div class="loading-spinner"></div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/es.js"></script>
    <script src="js/include.js"></script>
    <script src="js/dashboard.js"></script>
    
    <!-- ========== SCRIPT RESPONSIVE PARA SIDEBAR ========== -->
    <script>
        let sidebarOpen = false;
        
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const hamburger = document.getElementById('hamburgerMenu');
            const body = document.body;
            
            if (!sidebar) return;
            
            sidebarOpen = !sidebarOpen;
            
            if (sidebarOpen) {
                sidebar.classList.add('open');
                if (overlay) overlay.classList.add('active');
                if (hamburger) hamburger.classList.add('active');
                body.style.overflow = 'hidden';
                const icon = hamburger.querySelector('i');
                if (icon) icon.className = 'fas fa-times';
            } else {
                closeSidebar();
            }
        }
        
        function closeSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const hamburger = document.getElementById('hamburgerMenu');
            const body = document.body;
            
            if (sidebar) {
                sidebar.classList.remove('open');
                if (overlay) overlay.classList.remove('active');
                if (hamburger) hamburger.classList.remove('active');
                body.style.overflow = '';
                const icon = hamburger.querySelector('i');
                if (icon) icon.className = 'fas fa-bars';
            }
            sidebarOpen = false;
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const hamburgerBtn = document.getElementById('hamburgerMenu');
            if (hamburgerBtn) hamburgerBtn.addEventListener('click', toggleSidebar);
            
            const overlay = document.getElementById('sidebarOverlay');
            if (overlay) overlay.addEventListener('click', closeSidebar);
            
            window.addEventListener('resize', function() {
                if (window.innerWidth > 1024 && sidebarOpen) closeSidebar();
            });
            
            document.addEventListener('click', function(e) {
                if (window.innerWidth <= 1024 && sidebarOpen) {
                    const sidebar = document.querySelector('.sidebar');
                    const hamburger = document.getElementById('hamburgerMenu');
                    if (sidebar && !sidebar.contains(e.target) && hamburger && !hamburger.contains(e.target)) {
                        closeSidebar();
                    }
                }
            });
            
            document.addEventListener('touchmove', function(e) {
                if (window.innerWidth <= 1024 && sidebarOpen) {
                    const sidebar = document.querySelector('.sidebar');
                    if (sidebar && !sidebar.contains(e.target)) e.preventDefault();
                }
            });
        });
        
        window.toggleSidebar = toggleSidebar;
        window.closeSidebar = closeSidebar;
    </script>
</body>

</html>
