<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informes de Cotización | FURIA MOTOR</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <link rel="stylesheet" href="css/misvehiculos.css">
    <link rel="stylesheet" href="css/cotizaciones.css">
</head>

<body>
    <div class="app">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-file-invoice-dollar"></i> Informes de Cotización</h1>
                    <p>Revisa y aprueba las cotizaciones de tus vehículos</p>
                </div>
                <div class="top-actions">
                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                </div>
            </header>

            <!-- Dashboard de métricas de cotizaciones -->
            <div class="dashboard-stats">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-clock"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="pendientesCount">0</h3>
                        <p>Cotizaciones Pendientes</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="aprobadasCount">0</h3>
                        <p>Aprobadas</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-times-circle"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="rechazadasCount">0</h3>
                        <p>Rechazadas</p>
                    </div>
                </div>
            </div>

            <!-- Filtros mejorados -->
            <div class="filtros-bar">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Buscar por orden o vehículo...">
                </div>
                <div class="filter-group">
                    <select id="filtroEstado">
                        <option value="all">📋 Todos los estados</option>
                        <option value="enviada">⏳ Pendientes</option>
                        <option value="aprobado_total">✅ Aprobadas Total</option>
                        <option value="aprobado_parcial">📝 Aprobadas Parcial</option>
                        <option value="rechazada">❌ Rechazadas</option>
                    </select>
                </div>
                <button id="refreshBtn" class="btn-filter">
                    <i class="fas fa-sync-alt"></i> Actualizar
                </button>
            </div>

            <!-- Grid de cotizaciones mejorado -->
            <div id="cotizacionesGrid" class="cotizaciones-grid">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Cargando cotizaciones...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de detalle de cotización MEJORADO -->
    <div id="modalDetalleCotizacion" class="modal">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3>
                    <i class="fas fa-file-invoice-dollar"></i>
                    Detalle de Cotización
                </h3>
                <button class="modal-close" onclick="cerrarModal('modalDetalleCotizacion')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="modalDetalleBody" class="modal-body">
                <div class="empty-state">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Cargando detalles...</p>
                </div>
            </div>
            <div class="modal-footer" id="cotizacionActions">
                <!-- Botones dinámicos -->
            </div>
        </div>
    </div>

    <!-- Modal para imprimir cotización -->
    <div id="modalImprimir" class="modal">
        <div class="modal-content modal-print">
            <div class="modal-header">
                <h3>
                    <i class="fas fa-print"></i>
                    Vista Previa de Cotización
                </h3>
                <button class="modal-close" onclick="cerrarModal('modalImprimir')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div id="printContent" class="print-content"></div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="cerrarModal('modalImprimir')">
                    <i class="fas fa-times"></i> Cerrar
                </button>
                <button class="btn-primary" onclick="imprimirCotizacion()">
                    <i class="fas fa-print"></i> Imprimir
                </button>
            </div>
        </div>
    </div>

    <!-- Modal de confirmación -->
    <div id="modalConfirmacion" class="modal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3 id="confirmacionTitulo">Confirmar acción</h3>
                <button class="modal-close" onclick="cerrarModal('modalConfirmacion')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="confirmacionMensaje"></div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="cerrarModal('modalConfirmacion')">Cancelar</button>
                <button class="btn-primary" id="confirmarBtn">Confirmar</button>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <script src="js/include.js"></script>
    <script src="js/cotizaciones.js"></script>
</body>

</html>
