<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes de Compra | Encargado Repuestos - FURIA MOTOR</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/solicitudes_compra.css">
</head>

<body>
    <div class="app">
        <!-- SIDEBAR -->
        <div id="sidebar-container"></div>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1>Solicitudes de Compra</h1>
                    <p>Gestiona las solicitudes de compra del Jefe de Taller</p>
                </div>
                <div class="top-actions">
                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                </div>
            </div>

            <!-- Filtros -->
            <div class="filtros-bar">
                <select id="filtroEstado">
                    <option value="all">Todos los estados</option>
                    <option value="pendiente">Pendientes</option>
                    <option value="comprado">Comprados</option>
                    <option value="entregado">Entregados</option>
                </select>
                <input type="text" id="searchInput" placeholder="Buscar por orden o repuesto...">
                <button id="refreshBtn" class="btn-secondary">
                    <i class="fas fa-sync-alt"></i> Actualizar
                </button>
            </div>

            <!-- Contenedor de solicitudes -->
            <div id="solicitudesContainer"></div>
        </main>
    </div>

    <!-- Modal para ver detalle -->
    <div id="modalDetalle" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-info-circle"></i> Detalle de Solicitud de Compra</h3>
                <span class="close-modal" onclick="cerrarModal('modalDetalle')">&times;</span>
            </div>
            <div id="modalDetalleBody"></div>
        </div>
    </div>

    <!-- Modal para marcar como comprado -->
    <div id="modalComprar" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-shopping-cart"></i> Marcar como Comprado</h3>
                <span class="close-modal" onclick="cerrarModal('modalComprar')">&times;</span>
            </div>
            <div id="modalComprarBody"></div>
        </div>
    </div>

    <!-- Modal para registrar entrega -->
    <div id="modalEntregar" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-truck"></i> Registrar Entrega</h3>
                <span class="close-modal" onclick="cerrarModal('modalEntregar')">&times;</span>
            </div>
            <div id="modalEntregarBody"></div>
        </div>
    </div>

    <!-- LOADING OVERLAY -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <script src="js/include.js"></script>
    <script src="js/solicitudes_compra.js"></script>
</body>

</html>
