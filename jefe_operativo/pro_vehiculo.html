<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jefe Operativo - Vehículos en Proceso | FURIA MOTOR</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/jefe_operativo/css/dashboard.css">
    <link rel="stylesheet" href="/jefe_operativo/css/pro_vehiculo.css">
</head>

<body>
    <div class="app">
        <!-- SIDEBAR INCLUIDO -->
        <div id="sidebar-container"></div>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="page-title">
                    <h1>Vehículos en Proceso</h1>
                    <p>Control y seguimiento de vehículos en taller</p>
                </div>

                <div class="top-actions">
                    <div class="notification-icon">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge">3</span>
                    </div>

                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                </div>
            </header>

            <!-- CONTENT -->
            <div class="content">
                <!-- Filtros rápidos -->
                <div class="filters-section">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Buscar por código, cliente o placa..." id="searchInput">
                    </div>

                    <div class="filter-tabs">
                        <button class="filter-tab active" data-filter="todos">Todos <span class="count"
                                id="countTodos">12</span></button>
                        <button class="filter-tab" data-filter="proceso">En proceso <span class="count"
                                id="countProceso">8</span></button>
                        <button class="filter-tab" data-filter="pausa">En pausa <span class="count"
                                id="countPausa">3</span></button>
                        <button class="filter-tab" data-filter="finalizado">Finalizados <span class="count"
                                id="countFinalizado">1</span></button>
                    </div>
                </div>

                <!-- Grid de tarjetas -->
                <div class="vehiculos-grid" id="vehiculosGrid">
                    <!-- Las tarjetas se generan dinámicamente -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de detalle rápido -->
    <div class="modal" id="detalleModal">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h2>Detalle del Vehículo</h2>
                <button class="modal-close" onclick="cerrarModal()">&times;</button>
            </div>
            <div class="modal-body" id="detalleModalBody">
                <!-- Contenido dinámico -->
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="cerrarModal()">Cerrar</button>
                <button class="btn-primary" onclick="verOrdenCompleta()">Ver orden completa</button>
            </div>
        </div>
    </div>

    <script src="/jefe_operativo/js/include.js"></script>
    <script src="/jefe_operativo/js/pro_vehiculo.js"></script>
</body>

</html>
