<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil | Encargado Repuestos - FURIA MOTOR</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/perfil.css">
</head>

<body>
    <div class="app">
        <!-- SIDEBAR -->
        <div id="sidebar-container"></div>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1>Mi Perfil</h1>
                    <p>Gestiona tu información personal y contraseña</p>
                </div>
                <div class="top-actions">
                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                </div>
            </div>

            <div class="content">
                <div class="perfil-grid">
                    <!-- Columna Izquierda - Avatar -->
                    <div class="perfil-card avatar-card">
                        <div class="avatar-container">
                            <div class="avatar-large" id="avatarPreview">
                                <i class="fas fa-boxes"></i>
                            </div>
                            <button class="btn-cambiar-avatar" onclick="abrirModalAvatar()">
                                <i class="fas fa-camera"></i> Cambiar avatar
                            </button>
                        </div>
                        <div class="info-basica">
                            <h2 id="displayNombre">Cargando...</h2>
                            <p class="rol-badge">Encargado de Repuestos</p>
                            <p class="email-display" id="displayEmail">cargando@email.com</p>
                        </div>
                    </div>

                    <!-- Columna Derecha - Información y Contraseña -->
                    <div class="perfil-card">
                        <!-- Información Personal -->
                        <div class="card-header">
                            <h3><i class="fas fa-user-circle"></i> Información Personal</h3>
                            <button class="btn-secondary btn-sm" id="btnEditarInfo">
                                <i class="fas fa-pen"></i> Editar
                            </button>
                        </div>
                        <form id="formInformacion">
                            <div class="form-group">
                                <label>Nombre Completo</label>
                                <input type="text" id="nombre" class="form-control" disabled>
                            </div>
                            <div class="form-group">
                                <label>Correo Electrónico</label>
                                <input type="email" id="email" class="form-control" disabled>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label>Teléfono</label>
                                    <input type="tel" id="telefono" class="form-control" disabled>
                                </div>
                                <div class="form-group">
                                    <label>WhatsApp</label>
                                    <input type="tel" id="whatsapp" class="form-control" disabled>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Dirección</label>
                                <input type="text" id="direccion" class="form-control" disabled>
                            </div>
                            <div class="form-actions" id="infoActions" style="display: none;">
                                <button type="button" class="btn-secondary" onclick="cancelarEdicionInfo()">Cancelar</button>
                                <button type="submit" class="btn-primary">Guardar Cambios</button>
                            </div>
                        </form>

                        <div class="divider"></div>

                        <!-- Cambiar Contraseña -->
                        <div class="card-header">
                            <h3><i class="fas fa-lock"></i> Cambiar Contraseña</h3>
                        </div>
                        <form id="formPassword">
                            <div class="form-group">
                                <label>Contraseña Actual</label>
                                <div class="password-input-group">
                                    <input type="password" id="passwordActual" class="form-control" required>
                                    <button type="button" class="toggle-password" onclick="togglePassword('passwordActual')">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Nueva Contraseña</label>
                                <div class="password-input-group">
                                    <input type="password" id="passwordNueva" class="form-control" required>
                                    <button type="button" class="toggle-password" onclick="togglePassword('passwordNueva')">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                                <div class="password-strength" id="passwordStrength"></div>
                            </div>
                            <div class="form-group">
                                <label>Confirmar Nueva Contraseña</label>
                                <div class="password-input-group">
                                    <input type="password" id="passwordConfirmar" class="form-control" required>
                                    <button type="button" class="toggle-password" onclick="togglePassword('passwordConfirmar')">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="form-actions">
                                <button type="submit" class="btn-primary">
                                    <i class="fas fa-sync-alt"></i> Cambiar Contraseña
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal para cambiar avatar -->
    <div id="modalAvatar" class="modal">
        <div class="modal-content modal-sm">
            <div class="modal-header">
                <h3><i class="fas fa-image"></i> Cambiar Avatar</h3>
                <span class="close-modal" onclick="cerrarModal('modalAvatar')">&times;</span>
            </div>
            <div class="modal-body">
                <div class="avatar-options">
                    <div class="avatar-option" onclick="seleccionarAvatar('box')">
                        <i class="fas fa-boxes"></i>
                        <span>Repuestos</span>
                    </div>
                    <div class="avatar-option" onclick="seleccionarAvatar('user')">
                        <i class="fas fa-user-circle"></i>
                        <span>Usuario</span>
                    </div>
                    <div class="avatar-option" onclick="seleccionarAvatar('truck')">
                        <i class="fas fa-truck"></i>
                        <span>Proveedor</span>
                    </div>
                    <div class="avatar-option" onclick="seleccionarAvatar('warehouse')">
                        <i class="fas fa-warehouse"></i>
                        <span>Almacén</span>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="cerrarModal('modalAvatar')">Cancelar</button>
                <button class="btn-primary" onclick="guardarAvatar()">Guardar</button>
            </div>
        </div>
    </div>

    <!-- LOADING OVERLAY -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <script src="js/include.js"></script>
    <script src="js/perfil.js"></script>
</body>

</html>
