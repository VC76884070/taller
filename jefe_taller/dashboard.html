<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jefe de Taller - Dashboard Técnico | FURIA MOTOR</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
    <div class="app">
        <!-- SIDEBAR -->
        <div id="sidebar-container"></div>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="page-title">
                    <h1>Dashboard Técnico</h1>
                    <p>Panel de control operativo del taller</p>
                </div>

                <div class="top-actions">
                    <div class="notification-icon">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge">5</span>
                    </div>
                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                </div>
            </header>

            <!-- CONTENT -->
            <div class="content">
                <!-- KPIs -->
                <div class="kpi-grid">
                    <div class="kpi-card">
                        <div class="kpi-icon" style="background: rgba(33, 150, 243, 0.1); color: #2196F3;">
                            <i class="fas fa-clipboard-check"></i>
                        </div>
                        <div class="kpi-content">
                            <span class="kpi-label">Órdenes Activas</span>
                            <span class="kpi-value" id="ordenesActivas">24</span>
                        </div>
                    </div>

                    <div class="kpi-card">
                        <div class="kpi-icon" style="background: rgba(255, 152, 0, 0.1); color: #FF9800;">
                            <i class="fas fa-pause-circle"></i>
                        </div>
                        <div class="kpi-content">
                            <span class="kpi-label">Órdenes en Pausa</span>
                            <span class="kpi-value" id="ordenesPausa">6</span>
                        </div>
                    </div>

                    <div class="kpi-card">
                        <div class="kpi-icon" style="background: rgba(76, 175, 80, 0.1); color: #4CAF50;">
                            <i class="fas fa-users-cog"></i>
                        </div>
                        <div class="kpi-content">
                            <span class="kpi-label">Técnicos Trabajando</span>
                            <span class="kpi-value" id="tecnicosActivos">8</span>
                        </div>
                    </div>

                    <div class="kpi-card">
                        <div class="kpi-icon" style="background: rgba(233, 30, 99, 0.1); color: #E91E63;">
                            <i class="fas fa-warehouse"></i>
                        </div>
                        <div class="kpi-content">
                            <span class="kpi-label">Bahías Ocupadas</span>
                            <span class="kpi-value" id="bahiasOcupadas">9</span>
                        </div>
                    </div>
                </div>

                <!-- Grid de dos columnas -->
                <div class="dashboard-grid">
                    <!-- Columna Izquierda -->
                    <div class="left-column">
                        <!-- Vista de Bahías -->
                        <div class="card">
                            <div class="card-header">
                                <h3><i class="fas fa-warehouse"></i> Estado de Bahías</h3>
                                <span class="badge-info">12 bahías disponibles</span>
                            </div>
                            <div class="bahias-grid" id="bahiasGrid">
                                <!-- Se llena dinámicamente -->
                            </div>
                        </div>

                        <!-- Mini Calendario -->
                        <div class="card">
                            <div class="card-header">
                                <h3><i class="fas fa-calendar-week"></i> Calendario Semanal</h3>
                                <button class="btn-icon" onclick="cambiarSemana('anterior')">
                                    <i class="fas fa-chevron-left"></i>
                                </button>
                                <span id="semanaActual">Semana 12</span>
                                <button class="btn-icon" onclick="cambiarSemana('siguiente')">
                                    <i class="fas fa-chevron-right"></i>
                                </button>
                            </div>
                            <div class="calendario-mini" id="calendarioMini">
                                <!-- Se llena dinámicamente -->
                            </div>
                        </div>
                    </div>

                    <!-- Columna Derecha -->
                    <div class="right-column">
                        <!-- Diagnósticos Pendientes -->
                        <div class="card">
                            <div class="card-header">
                                <h3><i class="fas fa-stethoscope"></i> Diagnósticos Pendientes</h3>
                                <span class="badge-warning" id="pendientesCount">3</span>
                            </div>
                            <div class="diagnosticos-list" id="diagnosticosList">
                                <!-- Se llena dinámicamente -->
                            </div>
                        </div>

                        <!-- Próximas Entregas -->
                        <div class="card">
                            <div class="card-header">
                                <h3><i class="fas fa-clock"></i> Próximas Entregas</h3>
                            </div>
                            <div class="entregas-list" id="entregasList">
                                <!-- Se llena dinámicamente -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/include.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
