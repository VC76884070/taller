<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitudes de Compra | Encargado Repuestos - FURIA MOTOR</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/solicitudes_compra.css">
    <!-- ========== CONFIGURACIÓN PWA (ICONO TORQUE) ========== -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#C1121F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TORQUE">
    
    <!-- ICONO PARA LA PESTAÑA DEL NAVEGADOR -->
    <link rel="icon" type="image/png" href="/icono.png">
    <link rel="shortcut icon" type="image/png" href="/icono.png">
    
    <!-- ICONO PARA IPHONE / IPAD (pantalla de inicio) -->
    <link rel="apple-touch-icon" href="/icono.png">
    
    <!-- ICONO PARA ANDROID (chrome) -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icono.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icono.png">
    <!-- ===================================================== -->
</head>

<body>
    <div class="app">
        <!-- SIDEBAR -->
        <div id="sidebar-container"></div>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-shopping-cart"></i> Solicitudes de Compra</h1>
                    <p>Gestiona las solicitudes de compra del Jefe de Taller</p>
                </div>
                <div class="top-actions">
                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                    <button class="btn-logout" id="logoutBtn" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </div>

            <!-- Estadísticas rápidas -->
            <div class="stats-cards" id="statsContainer">
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-clock"></i></div>
                    <div class="stat-info">
                        <span class="stat-value" id="statPendientes">0</span>
                        <span class="stat-label">Pendientes</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                    <div class="stat-info">
                        <span class="stat-value" id="statComprados">0</span>
                        <span class="stat-label">Comprados</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-truck"></i></div>
                    <div class="stat-info">
                        <span class="stat-value" id="statEntregados">0</span>
                        <span class="stat-label">Entregados</span>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                    <div class="stat-info">
                        <span class="stat-value" id="statTotal">0</span>
                        <span class="stat-label">Total</span>
                    </div>
                </div>
            </div>

            <!-- Filtros -->
            <div class="filtros-bar">
                <div class="filter-group">
                    <label><i class="fas fa-filter"></i> Estado</label>
                    <select id="filtroEstado" class="form-select-sm">
                        <option value="all">Todos los estados</option>
                        <option value="pendiente">Pendientes</option>
                        <option value="comprado">Comprados</option>
                        <option value="entregado">Entregados</option>
                    </select>
                </div>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Buscar por orden o repuesto...">
                </div>
                <button id="refreshBtn" class="btn-outline">
                    <i class="fas fa-sync-alt"></i> Actualizar
                </button>
            </div>

            <!-- Contenedor de solicitudes -->
            <div id="solicitudesContainer"></div>
        </main>
    </div>

    <!-- Modal para ver detalle -->
    <div id="modalDetalle" class="modal">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3><i class="fas fa-info-circle"></i> Detalle de Solicitud de Compra</h3>
                <button class="modal-close" onclick="cerrarModal('modalDetalle')">&times;</button>
            </div>
            <div class="modal-body" id="modalDetalleBody"></div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="cerrarModal('modalDetalle')">Cerrar</button>
            </div>
        </div>
    </div>

    <!-- Modal para marcar como comprado (CON SUBIDA DE COMPROBANTE) -->
    <div id="modalComprar" class="modal">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3><i class="fas fa-shopping-cart"></i> Marcar como Comprado</h3>
                <button class="modal-close" onclick="cerrarModal('modalComprar')">&times;</button>
            </div>
            <div class="modal-body" id="modalComprarBody"></div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="cerrarModal('modalComprar')">Cancelar</button>
                <button class="btn-primary" id="confirmarCompraBtn" onclick="confirmarCompra()">
                    <i class="fas fa-check-circle"></i> Confirmar Compra
                </button>
            </div>
        </div>
    </div>

    <!-- Modal para registrar entrega -->
    <div id="modalEntregar" class="modal">
        <div class="modal-content modal-md">
            <div class="modal-header">
                <h3><i class="fas fa-truck"></i> Registrar Entrega</h3>
                <button class="modal-close" onclick="cerrarModal('modalEntregar')">&times;</button>
            </div>
            <div class="modal-body" id="modalEntregarBody"></div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="cerrarModal('modalEntregar')">Cancelar</button>
                <button class="btn-primary" id="confirmarEntregaBtn" onclick="confirmarEntrega()">
                    <i class="fas fa-truck"></i> Confirmar Entrega
                </button>
            </div>
        </div>
    </div>

    <!-- Modal para ver comprobante -->
    <div id="modalVerComprobante" class="modal">
        <div class="modal-content modal-md">
            <div class="modal-header">
                <h3><i class="fas fa-receipt"></i> Comprobante de Compra</h3>
                <button class="modal-close" onclick="cerrarModal('modalVerComprobante')">&times;</button>
            </div>
            <div class="modal-body" id="modalVerComprobanteBody"></div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="cerrarModal('modalVerComprobante')">Cerrar</button>
                <a id="descargarComprobanteBtn" class="btn-primary" download style="text-decoration: none;">
                    <i class="fas fa-download"></i> Descargar
                </a>
            </div>
        </div>
    </div>

    <!-- LOADING OVERLAY -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <script src="js/include.js"></script>
    <script src="js/solicitudes_compra.js"></script>
</body>

</html>
