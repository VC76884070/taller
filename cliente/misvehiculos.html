<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Vehículos | FURIA MOTOR</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/misvehiculos.css">
    <!-- ========== CONFIGURACIÓN PWA (ICONO TORQUE) ========== -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#C1121F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TORQUE">
    
    <!-- ICONO PARA LA PESTAÑA DEL NAVEGADOR -->
    <link rel="icon" type="image/png" href="/icono.png">
    <link rel="shortcut icon" type="image/png" href="/icono.png">
    
    <!-- ICONO PARA IPHONE / IPAD (pantalla de inicio) -->
    <link rel="apple-touch-icon" href="/icono.png">
    
    <!-- ICONO PARA ANDROID (chrome) -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icono.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icono.png">
    <!-- ===================================================== -->
</head>

<body>
    <div class="app">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-car"></i> Mis Vehículos</h1>
                    <p>Gestiona y da seguimiento a tus autos</p>
                </div>
                <div class="top-actions">
                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                    <!-- Botón de logout eliminado porque ya está en el sidebar -->
                </div>
            </header>

            <!-- Dashboard de métricas -->
            <div class="dashboard-stats">
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-car"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="totalVehiculos">0</h3>
                        <p>Vehículos Registrados</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-tools"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="vehiculosEnTaller">0</h3>
                        <p>En Taller</p>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="vehiculosFinalizados">0</h3>
                        <p>Reparaciones Completadas</p>
                    </div>
                </div>
            </div>

            <!-- Sistema de pestañas mejorado -->
            <div class="tabs-container">
                <div class="tabs-header">
                    <button class="tab-btn active" data-tab="vehiculos">
                        <i class="fas fa-car-side"></i>
                        <span>Mis Vehículos</span>
                        <span class="tab-badge" id="vehiculosCount">0</span>
                    </button>
                    <button class="tab-btn" data-tab="recientes">
                        <i class="fas fa-clock"></i>
                        <span>Actividad Reciente</span>
                    </button>
                    <button class="tab-btn" data-tab="estadisticas">
                        <i class="fas fa-chart-pie"></i>
                        <span>Estadísticas</span>
                    </button>
                </div>

                <div class="tabs-content">
                    <!-- Pestaña de Vehículos -->
                    <div class="tab-pane active" id="vehiculos-tab">
                        <div class="content-header">
                            <div class="search-box">
                                <i class="fas fa-search"></i>
                                <input type="text" id="searchVehiculo"
                                    placeholder="Buscar por placa, marca o modelo...">
                            </div>
                            <button class="btn-filter" id="filterBtn">
                                <i class="fas fa-filter"></i>
                                Filtrar
                            </button>
                        </div>
                        <div id="vehiculosGrid" class="vehiculos-grid">
                            <div class="empty-state">
                                <i class="fas fa-spinner fa-spin"></i>
                                <p>Cargando tus vehículos...</p>
                            </div>
                        </div>
                    </div>

                    <!-- Pestaña de Actividad Reciente -->
                    <div class="tab-pane" id="recientes-tab">
                        <div class="activity-timeline" id="activityTimeline">
                            <div class="empty-state">
                                <i class="fas fa-spinner fa-spin"></i>
                                <p>Cargando actividad...</p>
                            </div>
                        </div>
                    </div>

                    <!-- Pestaña de Estadísticas -->
                    <div class="tab-pane" id="estadisticas-tab">
                        <div class="stats-grid">
                            <div class="stats-card">
                                <h4><i class="fas fa-chart-line"></i> Reparaciones por mes</h4>
                                <canvas id="reparacionesChart"></canvas>
                            </div>
                            <div class="stats-card">
                                <h4><i class="fas fa-motorcycle"></i> Estado de flota</h4>
                                <canvas id="estadoChart"></canvas>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de detalle mejorado -->
    <div class="modal" id="modalDetalleVehiculo">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3><i class="fas fa-car"></i> <span id="modalTitulo">Detalle del Vehículo</span></h3>
                <button class="modal-close" onclick="cerrarModal('modalDetalleVehiculo')">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body" id="modalDetalleBody">
                <!-- Contenido dinámico -->
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="cerrarModal('modalDetalleVehiculo')">Cerrar</button>
                <button class="btn-primary" id="btnVerAvances" onclick="irAvances()">
                    <i class="fas fa-chart-line"></i> Ver progreso completo
                </button>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/include.js"></script>
    <script src="js/misvehiculos.js"></script>
</body>

</html>
