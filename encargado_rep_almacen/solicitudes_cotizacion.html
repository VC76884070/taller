<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Solicitudes de Cotización | Encargado Repuestos - FURIA MOTOR</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/solicitudes_cotizacion.css">
    
    <!-- ========== CONFIGURACIÓN PWA ========== -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#C1121F">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="TORQUE">
    
    <link rel="icon" type="image/png" href="/icono.png">
    <link rel="shortcut icon" type="image/png" href="/icono.png">
    <link rel="apple-touch-icon" href="/icono.png">
    <link rel="icon" type="image/png" sizes="192x192" href="/icono.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icono.png">
</head>

<body>
    <!-- Botón hamburguesa para móvil/tablet -->
    <button class="hamburger-menu" id="hamburgerMenu" aria-label="Menú">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Overlay para cerrar sidebar -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="app">
        <!-- SIDEBAR -->
        <div id="sidebar-container"></div>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-file-invoice-dollar" style="color: var(--rojo-primario); margin-right: 0.5rem;"></i> Solicitudes de Cotización</h1>
                    <p>Responde a las solicitudes de repuestos del Jefe de Taller</p>
                </div>
                <div class="top-actions">
                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                </div>
            </div>

            <!-- Filtros -->
            <div class="filtros-bar">
                <select id="filtroEstado">
                    <option value="all">Todos los estados</option>
                    <option value="pendiente">Pendientes</option>
                    <option value="cotizado">Cotizados</option>
                    <option value="aprobado">Aprobados</option>
                    <option value="rechazado">Rechazados</option>
                </select>
                <input type="text" id="searchInput" placeholder="Buscar por orden o repuesto...">
                <button id="refreshBtn" class="btn-secondary">
                    <i class="fas fa-sync-alt"></i> Actualizar
                </button>
            </div>

            <!-- Contenedor de solicitudes -->
            <div id="solicitudesContainer"></div>
        </main>
    </div>

    <!-- Modal para cotizar -->
    <div id="modalCotizar" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-tags"></i> Cotizar Repuestos</h3>
                <span class="close-modal" onclick="cerrarModal('modalCotizar')">&times;</span>
            </div>
            <div id="modalCotizarBody"></div>
        </div>
    </div>

    <!-- Modal para ver detalle -->
    <div id="modalDetalle" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><i class="fas fa-info-circle"></i> Detalle de Solicitud</h3>
                <span class="close-modal" onclick="cerrarModal('modalDetalle')">&times;</span>
            </div>
            <div id="modalDetalleBody"></div>
        </div>
    </div>

    <!-- LOADING OVERLAY -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <p>Cargando...</p>
    </div>

    <script src="js/include.js"></script>
    <script src="js/solicitudes_cotizacion.js"></script>
    
    <script>
        // =====================================================
        // FUNCIONES RESPONSIVE PARA SIDEBAR
        // =====================================================
        let sidebarOpen = false;
        
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const hamburger = document.getElementById('hamburgerMenu');
            const body = document.body;
            
            if (!sidebar) return;
            
            sidebarOpen = !sidebarOpen;
            
            if (sidebarOpen) {
                sidebar.classList.add('open');
                if (overlay) overlay.classList.add('active');
                if (hamburger) hamburger.classList.add('active');
                body.style.overflow = 'hidden';
                const icon = hamburger.querySelector('i');
                if (icon) icon.className = 'fas fa-times';
            } else {
                closeSidebar();
            }
        }
        
        function closeSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const hamburger = document.getElementById('hamburgerMenu');
            const body = document.body;
            
            if (sidebar) {
                sidebar.classList.remove('open');
                if (overlay) overlay.classList.remove('active');
                if (hamburger) hamburger.classList.remove('active');
                body.style.overflow = '';
                const icon = hamburger.querySelector('i');
                if (icon) icon.className = 'fas fa-bars';
            }
            sidebarOpen = false;
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            const hamburgerBtn = document.getElementById('hamburgerMenu');
            if (hamburgerBtn) {
                hamburgerBtn.addEventListener('click', toggleSidebar);
            }
            
            const overlay = document.getElementById('sidebarOverlay');
            if (overlay) {
                overlay.addEventListener('click', closeSidebar);
            }
            
            window.addEventListener('resize', function() {
                if (window.innerWidth > 1024 && sidebarOpen) {
                    closeSidebar();
                }
            });
            
            document.addEventListener('click', function(e) {
                if (window.innerWidth <= 1024 && sidebarOpen) {
                    const sidebar = document.querySelector('.sidebar');
                    const hamburger = document.getElementById('hamburgerMenu');
                    if (sidebar && !sidebar.contains(e.target) && hamburger && !hamburger.contains(e.target)) {
                        closeSidebar();
                    }
                }
            });
        });
        
        window.toggleSidebar = toggleSidebar;
        window.closeSidebar = closeSidebar;
    </script>
</body>

</html>
