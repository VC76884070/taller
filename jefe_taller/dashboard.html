<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jefe de Taller - Dashboard Técnico | FURIA MOTOR</title>

    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- FullCalendar CSS -->
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body>
    <div class="app">
        <!-- SIDEBAR -->
        <div id="sidebar-container"></div>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <!-- Top Bar -->
            <header class="top-bar">
                <div class="page-title">
                    <h1>Dashboard Técnico</h1>
                    <p>Panel de control operativo del taller</p>
                </div>

                <div class="top-actions">
                    <div class="notification-icon">
                        <i class="fas fa-bell"></i>
                        <span class="notification-badge">5</span>
                    </div>
                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                </div>
            </header>

            <!-- CONTENT -->
            <div class="content">
                <!-- Grid de dos columnas -->
                <div class="dashboard-grid">
                    <!-- Columna Izquierda -->
                    <div class="left-column">
                        <!-- Vista de Bahías -->
                        <div class="card">
                            <div class="card-header">
                                <h3><i class="fas fa-warehouse"></i> Estado de Bahías</h3>
                                <span class="badge-info">12 bahías disponibles</span>
                            </div>
                            <div class="bahias-grid" id="bahiasGrid">
                                <!-- Se llena dinámicamente -->
                            </div>
                        </div>

                        <!-- Calendario Mensual con Días Pintados -->
                        <div class="card calendario-card">
                            <div class="card-header">
                                <h3><i class="fas fa-calendar-alt"></i> Calendario de Reparaciones</h3>
                                <div class="calendario-leyenda">
                                    <span class="leyenda-item"><span class="color-reparacion"></span> En
                                        reparación</span>
                                    <span class="leyenda-item"><span class="color-entrega"></span> Entrega</span>
                                    <span class="leyenda-item"><span class="color-atrasado"></span> Atrasado</span>
                                </div>
                            </div>
                            <div class="calendario-wrapper">
                                <div id="calendarioJefe"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Columna Derecha -->
                    <div class="right-column">
                        <!-- Diagnósticos Pendientes -->
                        <div class="card">
                            <div class="card-header">
                                <h3><i class="fas fa-stethoscope"></i> Diagnósticos Pendientes</h3>
                                <span class="badge-warning" id="pendientesCount">0</span>
                            </div>
                            <div class="diagnosticos-list" id="diagnosticosList">
                                <!-- Se llena dinámicamente -->
                            </div>
                        </div>

                        <!-- Próximas Entregas -->
                        <div class="card">
                            <div class="card-header">
                                <h3><i class="fas fa-clock"></i> Próximas Entregas</h3>
                            </div>
                            <div class="entregas-list" id="entregasList">
                                <!-- Se llena dinámicamente -->
                            </div>
                        </div>

                        <!-- Vehículos en Taller -->
                        <div class="card">
                            <div class="card-header">
                                <h3><i class="fas fa-car"></i> Vehículos en Taller</h3>
                                <span class="badge-info" id="vehiculosTallerCount">0</span>
                            </div>
                            <div class="vehiculos-taller-list" id="vehiculosTallerList">
                                <!-- Se llena dinámicamente -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" style="display: none;">
        <div class="loading-spinner"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/locales/es.min.js"></script>
    <script src="js/include.js"></script>
    <script src="js/dashboard.js"></script>
</body>

</html>
