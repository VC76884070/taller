<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Vehículos | FURIA MOTOR</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="css/misvehiculos.css">
</head>

<body>
    <div class="app">
        <div id="sidebar-container"></div>

        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h1><i class="fas fa-car"></i> Mis Vehículos</h1>
                    <p>Selecciona tu auto para ver el progreso</p>
                </div>
                <div class="top-actions">
                    <div class="date-display">
                        <i class="far fa-calendar-alt"></i>
                        <span id="currentDate"></span>
                    </div>
                    <button class="btn-logout" onclick="cerrarSesion()">
                        <i class="fas fa-sign-out-alt"></i>
                    </button>
                </div>
            </header>

            <div class="content">
                <!-- Grid de vehículos simplificado -->
                <div id="vehiculosGrid" class="vehiculos-grid">
                    <div class="empty-state">
                        <i class="fas fa-spinner fa-spin"></i>
                        <p>Cargando tus vehículos...</p>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de detalle (solo para ver avances) -->
    <div class="modal" id="modalDetalleVehiculo">
        <div class="modal-content modal-md">
            <div class="modal-header">
                <h3><i class="fas fa-car"></i> <span id="modalTitulo">Detalle</span></h3>
                <button class="modal-close" onclick="cerrarModal('modalDetalleVehiculo')">&times;</button>
            </div>
            <div class="modal-body" id="modalDetalleBody">
                <!-- Contenido dinámico -->
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="cerrarModal('modalDetalleVehiculo')">Cerrar</button>
                <button class="btn-primary" id="btnVerAvances" onclick="irAvances()">
                    <i class="fas fa-chart-line"></i> Ver progreso
                </button>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <script src="js/include.js"></script>
    <script src="js/misvehiculos.js"></script>
</body>

</html>
